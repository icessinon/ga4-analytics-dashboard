name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  build-app:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Buildx セットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCRにログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: appイメージをビルド・push（linux/arm64）
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/app:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  build-scheduler:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Buildx セットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCRにログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: schedulerイメージをビルド・push（linux/arm64）
        uses: docker/build-push-action@v5
        with:
          context: .
          target: scheduler
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/scheduler:latest
          cache-from: type=gha,scope=scheduler
          cache-to: type=gha,mode=max,scope=scheduler

  deploy:
    needs: [build-app, build-scheduler]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: EC2にデプロイ
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/ga4-analytics-dashboard
            git pull origin master
            docker compose pull
            docker compose up -d
            docker compose ps
