name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: GHCRにログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: appイメージをビルド・push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: true
          tags: ghcr.io/${{ github.repository }}/app:latest

      - name: schedulerイメージをビルド・push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: scheduler
          push: true
          tags: ghcr.io/${{ github.repository }}/scheduler:latest

      - name: EC2にデプロイ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' > ~/.ssh/config

          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            set -e
            cd /var/www/ga4-analytics-dashboard
            git pull origin master
            docker compose pull
            docker compose up -d
            docker compose ps
          "
