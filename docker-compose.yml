# 本番・Docker 全体運用用（PostgreSQL + Redis + App + Scheduler）
services:
  postgres:
    image: postgres:16-alpine
    container_name: ga4-dashboard-postgres
    restart: unless-stopped
    # 本番では外部公開不要。必要な場合のみコメントアウトを外す
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: ga4_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ga4-dashboard-redis
    restart: unless-stopped
    # 本番では外部公開不要
    # ports:
    #   - "6380:6379"
    # t4g.small（2GB）でのOOM防止: 100MB上限、古いキーから削除
    command: ["redis-server", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: ga4-analytics-dashboard:app
    pull_policy: never
    container_name: ga4-dashboard-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ga4_dashboard?schema=public
      REDIS_URL: redis://redis:6379
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    env_file:
      - .env
    volumes:
      - ./service-account-key.json:/app/service-account-key.json:ro
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: scheduler
    image: ga4-analytics-dashboard:scheduler
    pull_policy: never
    container_name: ga4-dashboard-scheduler
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ga4_dashboard?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://app:3000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    env_file:
      - .env
    volumes:
      - ./service-account-key.json:/app/service-account-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

volumes:
  postgres_data:
  logs_data:
